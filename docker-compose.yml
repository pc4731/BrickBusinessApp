services:
  postgres:
    image: postgres:16-alpine
    container_name: brick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brick
      POSTGRES_PASSWORD: brick
      POSTGRES_DB: brick_erp
    ports:
      # Host 5433 → container 5432, avoiding clashes with a native Postgres on 5432.
      - '5433:5432'
    volumes:
      - brick_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brick -d brick_erp']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brick_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - brick_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  brick_pgdata:
  brick_redisdata:
